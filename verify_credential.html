<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Certificate Credentials — Acadex</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body {
      background: var(--bg-alt);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: var(--font-main);
    }
    .verify-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      padding: 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .verify-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      font-size: 2.2rem;
      margin-bottom: 20px;
    }
    .verify-badge.success {
      background: var(--success-light);
      color: var(--success);
    }
    .verify-badge.error {
      background: var(--danger-light);
      color: var(--danger);
    }
    .verify-details {
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      font-size: 0.88rem;
    }
    .detail-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .detail-label {
      color: var(--text-muted);
    }
    .detail-val {
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="verify-card">
    <div id="verifyResultContainer">
      <!-- Loaded dynamically -->
      <div style="padding: 30px;">
        <i class="fa fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
        <p style="margin-top: 15px; color: var(--text-muted);">Verifying credential with registry database...</p>
      </div>
    </div>
    <div style="margin-top: 24px; font-size: 0.78rem; color: var(--text-muted);">
      <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;"><i class="fa fa-home"></i> Back to Acadex Home</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('verifyResultContainer');
      const params = new URLSearchParams(window.location.search);
      const certId = params.get('id');

      if (!certId) {
        container.innerHTML = `
          <div class="verify-badge error">
            <i class="fa fa-times-circle"></i>
          </div>
          <h2 style="font-weight:700; color:var(--danger); margin-bottom:8px;">Verification Refused</h2>
          <p class="text-sm text-muted">No Certificate ID was provided in the query string parameters. Please check the URL.</p>
        `;
        return;
      }

      // Query database
      const users = Store.get('users', []);
      let matchedStudent = null;
      let matchedCert = null;

      for (const u of users) {
        if (u.role === 'student' && u.certificates) {
          const cert = u.certificates.find(c => c.id === certId);
          if (cert) {
            matchedStudent = u;
            matchedCert = cert;
            break;
          }
        }
      }

      if (matchedStudent && matchedCert) {
        container.innerHTML = `
          <div class="verify-badge success">
            <i class="fa fa-check-circle"></i>
          </div>
          <h2 style="font-weight:800; color:var(--success); margin-bottom:4px; font-family:var(--font-display);">Credential Verified</h2>
          <p class="text-xs text-muted">This digital certificate has been verified as authentic.</p>

          <div class="verify-details">
            <div class="detail-row">
              <span class="detail-label">Certificate ID</span>
              <span class="detail-val" style="color:var(--primary); font-family:monospace;">${matchedCert.id}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Recipient Name</span>
              <span class="detail-val">${matchedStudent.name}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Register Number</span>
              <span class="detail-val">${matchedStudent.registerNumber || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Department</span>
              <span class="detail-val">${matchedStudent.department || 'N/A'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Module Certified</span>
              <span class="detail-val" style="color:var(--accent);">${matchedCert.name}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Issue Date</span>
              <span class="detail-val">${Format.date(matchedCert.issueDate)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Status</span>
              <span class="badge badge-success">ACTIVE & SECURED</span>
            </div>
          </div>

          <p style="font-size:0.75rem; color:var(--text-muted); line-height:1.4;">Acadex verifies that this student has completed all rigorous coursework, mentoring hours, assessments, and internship assignments required for this credential.</p>
        `;
      } else {
        container.innerHTML = `
          <div class="verify-badge error">
            <i class="fa fa-exclamation-triangle"></i>
          </div>
          <h2 style="font-weight:700; color:var(--danger); margin-bottom:8px;">Verification Failed</h2>
          <p class="text-sm text-muted">The certificate credential ID <strong>${certId}</strong> was not found in the Acadex Registry Database. It may be invalid, revoked, or manual tampering might have occurred.</p>
        `;
      }
    });
  </script>
</body>
</html>
